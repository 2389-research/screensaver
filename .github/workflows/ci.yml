# ABOUTME: Runs build + tests on every push and pull request.
# ABOUTME: Ensures the screensaver compiles and all tests pass.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Build
        run: |
          xcodebuild build \
            -scheme ClaudeCodeScreenSaver \
            -destination 'platform=macOS'

      - name: Test
        run: |
          xcodebuild test \
            -scheme ClaudeCodeScreenSaver \
            -destination 'platform=macOS'
