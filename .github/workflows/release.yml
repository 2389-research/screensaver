# ABOUTME: Builds, signs, notarizes, and publishes the screensaver as a GitHub Release.
# ABOUTME: Triggered by tags matching v*.*.* (e.g. v1.0.0). Uploads signed .saver.zip artifact.

name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-26
    env:
      SCHEME: ClaudeCodeScreenSaver
      SAVER_NAME: ClaudeCodeScreenSaver.saver

    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Signing Keychain
        env:
          DEVELOPER_ID_APPLICATION_CERT_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_CERT_BASE64 }}
          DEVELOPER_ID_APPLICATION_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_CERT_PASSWORD }}
        run: |
          set -euo pipefail

          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          CERT_PATH="$RUNNER_TEMP/developer-id-application.p12"

          echo "$DEVELOPER_ID_APPLICATION_CERT_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$RUNNER_TEMP" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$RUNNER_TEMP" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" \
            -P "$DEVELOPER_ID_APPLICATION_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$RUNNER_TEMP" "$KEYCHAIN_PATH"
          rm "$CERT_PATH"

      - name: Run Tests
        run: |
          xcodebuild test \
            -scheme "$SCHEME" \
            -destination 'platform=macOS' \
            -derivedDataPath ./DerivedData

      - name: Build Release
        run: |
          set -euo pipefail
          xcodebuild build \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath ./DerivedData \
            CODE_SIGNING_ALLOWED=NO

          SAVER_PATH="$(find ./DerivedData -name "$SAVER_NAME" -path "*/Release/*" | head -1)"
          if [ ! -d "$SAVER_PATH" ]; then
            echo "Saver bundle not found"
            find ./DerivedData -name "*.saver" -type d
            exit 1
          fi
          echo "SAVER_PATH=$SAVER_PATH" >> "$GITHUB_ENV"

      - name: Codesign Saver Bundle
        env:
          DEVELOPER_ID_APPLICATION_SIGNING_IDENTITY: ${{ secrets.DEVELOPER_ID_APPLICATION_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          SIGN_IDENTITY="$DEVELOPER_ID_APPLICATION_SIGNING_IDENTITY"

          # Sign the main executable
          codesign --force --timestamp --options runtime \
            --sign "$SIGN_IDENTITY" \
            "$SAVER_PATH/Contents/MacOS/ClaudeCodeScreenSaver"

          # Sign the bundle
          codesign --force --timestamp --options runtime \
            --sign "$SIGN_IDENTITY" \
            "$SAVER_PATH"

          # Verify
          codesign --verify --deep --strict --verbose=2 "$SAVER_PATH"

      - name: Notarize
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          set -euo pipefail

          API_KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo "$API_KEY_BASE64" | base64 --decode > "$API_KEY_PATH"

          # Create zip for notarization
          NOTARY_ZIP="$RUNNER_TEMP/notary.zip"
          ditto -c -k --sequesterRsrc --keepParent "$SAVER_PATH" "$NOTARY_ZIP"

          # Submit and wait
          SUBMISSION_OUTPUT="$RUNNER_TEMP/notary-submit.json"
          xcrun notarytool submit "$NOTARY_ZIP" \
            --key "$API_KEY_PATH" \
            --key-id "$API_KEY_ID" \
            --issuer "$API_ISSUER_ID" \
            --wait \
            --output-format json > "$SUBMISSION_OUTPUT"

          STATUS="$(python3 -c 'import json, pathlib, sys; print(json.loads(pathlib.Path(sys.argv[1]).read_text()).get("status", ""))' "$SUBMISSION_OUTPUT")"
          SUBMISSION_ID="$(python3 -c 'import json, pathlib, sys; print(json.loads(pathlib.Path(sys.argv[1]).read_text()).get("id", ""))' "$SUBMISSION_OUTPUT")"

          echo "Notary status: $STATUS (submission: $SUBMISSION_ID)"

          if [ "$STATUS" != "Accepted" ]; then
            echo "Notarization failed. Fetching log..."
            xcrun notarytool log "$SUBMISSION_ID" \
              --key "$API_KEY_PATH" \
              --key-id "$API_KEY_ID" \
              --issuer "$API_ISSUER_ID" || true
            rm "$API_KEY_PATH"
            exit 1
          fi

          # Staple the notarization ticket
          xcrun stapler staple "$SAVER_PATH"
          rm "$API_KEY_PATH"

      - name: Package Signed Bundle
        run: |
          mkdir -p artifacts
          cp -R "$SAVER_PATH" artifacts/$SAVER_NAME
          cd artifacts && zip -r $SAVER_NAME.zip $SAVER_NAME

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/ClaudeCodeScreenSaver.saver.zip
          generate_release_notes: true
          body: |
            ## Code Agent Screensaver ${{ github.ref_name }}

            ### Install
            1. Download `ClaudeCodeScreenSaver.saver.zip` below
            2. Unzip it
            3. Move `ClaudeCodeScreenSaver.saver` to `~/Library/Screen Savers/`
            4. Double-click to install, or open **System Settings > Screen Saver**

            ### Requirements
            - macOS 14.0+ (Sonoma)

            ---
            **This build is code signed and notarized with Developer ID.**

      - name: Cleanup Keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/build.keychain-db" || true
